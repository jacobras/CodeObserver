name: CodeObserver
description: CodeObserver is a CLI tool plus a dashboard to measure codebase metrics over time.
author: Jacob Ras
branding:
  icon: bar-chart-2
  color: blue

inputs:
  command:
    description: Command including parameters
    required: true
  server:
    description: The URL of the CodeObserver server
    required: true
  project:
    description: The ID of the project
    required: true

runs:
  using: composite
  steps:
    - name: Download metrics CLI
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        CLI_JAR="$RUNNER_TEMP/codeobserver-cli-0.5.2.jar"

        if [ ! -f "$CLI_JAR" ]; then
          if ! command -v gh >/dev/null 2>&1; then
            echo "::error::GitHub CLI (gh) is required but not found on PATH."
            exit 1
          fi

          gh release download 0.5.2 \
            --repo jacobras/CodeObserver \
            --pattern 'cli-*.jar' \
            --dir "$RUNNER_TEMP"

          DOWNLOADED=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name 'cli-*.jar' | head -n1)
          mv "$DOWNLOADED" "$CLI_JAR"
        fi

        echo "METRICS_CLI_JAR=$CLI_JAR" >> "$GITHUB_ENV"

    - name: Run metrics CLI
      shell: bash
      env:
        SERVER_URL: ${{ inputs.server }}
      run: |
        java -jar "$METRICS_CLI_JAR" \
          ${{ inputs.command }} \
          --server "$SERVER_URL" \
          --project "${{ inputs.project }}" \
          --command ${{ inputs.command }}