name: CodeObserver
description: CodeObserver is a CLI tool plus a dashboard to measure codebase metrics over time.
author: Jacob Ras
branding:
  icon: bar-chart-2
  color: blue

inputs:
  server-url:
    description: The URL of the CodeObserver server
    required: true
  project-id:
    description: The ID of the project
    required: true

runs:
  using: composite
  steps:
    - name: Download metrics CLI
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release download 0.5.0 \
          --repo "${{ github.action_repository }}" \
          --pattern 'cli-*.zip' \
          --dir "$RUNNER_TEMP"
        unzip -q "$RUNNER_TEMP"/cli-*.zip -d "$RUNNER_TEMP"
        CLI_BIN=$(find "$RUNNER_TEMP" -type f -path '*/bin/cli' | head -n1)
        echo "METRICS_CLI_BIN=$CLI_BIN" >> "$GITHUB_ENV"

    - name: Run metrics CLI
      shell: bash
      env:
        SERVER_URL: ${{ inputs.server-url }}
      run: |
        "$METRICS_CLI_BIN" \
          measure
          --server "$SERVER_URL" \
          --project "${{ inputs.project-id }}"